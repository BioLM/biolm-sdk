name: esmfold-single
schema_version: 1
description: Single ESMFold predict task for local runtime tests

inputs:
  sequence:
    type: text
    label: Protein sequence
    required: true
    initial: ''

tasks:
  - id: fold
    slug: esmfold
    action: predict
    request_body:
      items:
        - sequence: ${{ sequence }}
    response_mapping:
      mean_plddt: mean_plddt
      pdb: pdb
