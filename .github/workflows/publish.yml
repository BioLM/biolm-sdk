name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to publish to'
        required: false
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository == 'BioLM/biolm-sdk'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Normalize version for RC tags
        if: github.event_name == 'release' && contains(github.event.release.tag_name, '-rc')
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          
          tag = (os.environ.get("TAG_NAME") or "").strip()
          m = re.fullmatch(r"v?(\d+\.\d+\.\d+)-rc(\d+)", tag)
          if not m:
            raise SystemExit(f"Unexpected RC tag format: {tag!r}")
          
          pep440 = f"{m.group(1)}rc{m.group(2)}"
          init_py = Path("biolm/__init__.py")
          text = init_py.read_text(encoding="utf-8")
          new_text, n = re.subn(r"^(__version__\s*=\s*)['\"][^'\"]+['\"]\s*$", rf"\\1'{pep440}'", text, flags=re.M)
          if n != 1:
            raise SystemExit(f"Expected exactly one __version__ assignment in {init_py}, found {n}")
          init_py.write_text(new_text, encoding="utf-8")
          print(f"Set biolm.__version__ = {pep440}")
          PY

      - name: Build distribution
        run: make dist

      - name: Check distribution with twine
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.repository == 'BioLM/biolm-sdk' && (
        (github.event_name == 'workflow_dispatch' &&
         (github.event.inputs.repository == 'testpypi' || github.event.inputs.repository == '')) ||
        (github.event_name == 'release' && contains(github.event.release.tag_name, 'rc'))
      )
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.repository == 'BioLM/biolm-sdk' && (
        (github.event_name == 'release' && !contains(github.event.release.tag_name, 'rc')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'pypi')
      )
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
